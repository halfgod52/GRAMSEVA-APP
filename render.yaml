services:
  - type: web
    name: gramseva-core-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements-core.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1"
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: web
    name: gramseva-xray-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements-xray.txt"
    startCommand: "uvicorn train_chest_xray_server:app --host 0.0.0.0 --port $PORT --workers 1 --limit-concurrency 2"
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
